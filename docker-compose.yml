services:
  db:
    image: postgres:16-alpine
    container_name: devboard-db
    environment:
      POSTGRES_USER: devboard
      POSTGRES_PASSWORD: devboard
      POSTGRES_DB: devboard
    ports:
      - "5433:5432"   # host 5433 -> container 5432; 5432 is taken by CloudOps Lab
    volumes:
      - devboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devboard -d devboard"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  devboard_pgdata:
